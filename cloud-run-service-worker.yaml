apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tesla-worker
spec:
  template:
    metadata:
      annotations:
        # KLUCZOWE: Skalowanie do zera dla maksymalnej optymalizacji kosztów
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        # Szybki cold start
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "true"
        # Timeout dla operacji z Tesla HTTP Proxy (zoptymalizowany z 600s)
        run.googleapis.com/timeout: "300"
        # OPTYMALIZACJA v2: CPU Throttling + mniejsze zasoby + eliminacja get_secret()
        # 2026-02-01T20:00 - Aktualizacja tesla-http-proxy do najnowszej wersji (fix dla issue #186)
        deployment.timestamp: "2026-02-01T20:00:00Z"
    spec:
      # Timeout dla całego kontenera (zoptymalizowany z 600s)
      timeoutSeconds: 300
      containerConcurrency: 1
      containers:
      - name: tesla-worker
        image: europe-west1-docker.pkg.dev/off-peak-tesla-controller/cloud-run-source-deploy/tesla-worker:latest
        ports:
        - containerPort: 8080
        env:
        # KLUCZOWE: Worker mode
        - name: TESLA_WORKER_MODE
          value: "true"
        - name: CONTINUOUS_MODE
          value: "false"
        - name: GOOGLE_CLOUD_PROJECT
          value: "off-peak-tesla-controller"
        - name: GOOGLE_CLOUD_STORAGE_BUCKET
          value: "tesla-monitor-data-off-peak-tesla-controller"
        
        # Tesla API Configuration
        # OPTYMALIZACJA: CLIENT_ID jest stały - nie potrzebuje Secret Manager
        - name: TESLA_CLIENT_ID
          value: "e4ac68f1-5171-41e3-b28e-e88dbc0e2a19"
        - name: TESLA_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: tesla-client-secret
              key: latest
        # OPTYMALIZACJA: Stałe wartości Fleet API - nie potrzebują Secret Manager
        - name: TESLA_DOMAIN
          value: "off-peak-charge-v2.vercel.app"
        - name: TESLA_PUBLIC_KEY_URL
          value: "https://off-peak-charge-v2.vercel.app/.well-known/appspecific/com.tesla.3p.public-key.pem"
        # OPTYMALIZACJA: TESLA_REFRESH_TOKEN usunięty - tokeny pobierane z fleet-tokens

        # Tesla HTTP Proxy Configuration (Smart Proxy Mode)
        - name: TESLA_SMART_PROXY_MODE
          value: "true"
        - name: TESLA_PROXY_AVAILABLE
          value: "true"
        - name: TESLA_HTTP_PROXY_HOST
          value: "localhost"
        - name: TESLA_HTTP_PROXY_PORT
          value: "4443"
        
        # Home Location
        - name: HOME_LATITUDE
          value: "52.334215"
        - name: HOME_LONGITUDE
          value: "20.937516"
        - name: HOME_RADIUS
          value: "0.03"
        
        # OFF PEAK CHARGE API
        - name: OFF_PEAK_CHARGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: OFF_PEAK_CHARGE_API_KEY
              key: latest
        # OPTYMALIZACJA: URL jest stały - nie potrzebuje Secret Manager
        - name: OFF_PEAK_CHARGE_API_URL
          value: "https://off-peak-charge-v2.vercel.app/api/external-calculate"
        
        # Special Charging - Google Sheets Integration
        - name: GOOGLE_SHEETS_URL
          valueFrom:
            secretKeyRef:
              name: GOOGLE_SHEETS_URL
              key: latest
        - name: GOOGLE_SERVICE_ACCOUNT_KEY
          valueFrom:
            secretKeyRef:
              name: GOOGLE_SERVICE_ACCOUNT_KEY
              key: latest
        
        # Dynamic Cloud Scheduler dla Special Charging
        - name: GOOGLE_CLOUD_PROJECT
          value: "off-peak-tesla-controller"
        - name: GOOGLE_CLOUD_LOCATION
          value: "europe-west1"
        - name: WORKER_SERVICE_URL
          value: "https://tesla-worker-74pl3bqokq-ew.a.run.app"
        
        resources:
          # WORKER: Gen2 wymaga min 1 CPU i 512Mi RAM
          # CPU Throttling=true oznacza że płacimy tylko za faktyczne użycie CPU (~40% oszczędności)
          requests:
            cpu: "0.5"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        
        # Health check - Worker Service
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 3

        # Startup probe dla cold start z proxy
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 18  # 180 sekund na startup z proxy

---

# PODSUMOWANIE WORKER SERVICE:
#
# ZADANIE:
# - Pełna logika Tesla Monitor z Tesla HTTP Proxy
# - Wywołania OFF PEAK CHARGE API
# - Zarządzanie harmonogramami ładowania
#
# CZĘSTOTLIWOŚĆ:
# - 2-3 razy dziennie gdy Scout wykryje powrót do domu
# - 1 raz dziennie jako failsafe (nocne wybudzenie)
# - Łącznie: ~4 wywołania dziennie
#
# KOSZT:
# - ~5-10 groszy za wywołanie
# - Łączny koszt dzienny: ~20-40 groszy
# - Oszczędność vs obecna wersja: ~95%
#
# ENDPOINTS:
# - GET /health - Health check
# - GET /worker-status - Szczegółowy status Worker
# - POST /run-cycle - Pełny cykl monitorowania
# - POST /run-midnight-wake - Nocne wybudzenie
# - POST /scout-trigger - Wywołanie od Scout Function
# - GET /reset - Reset stanu
# - GET /reset-tesla-schedules - Reset harmonogramów 