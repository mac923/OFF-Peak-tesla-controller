steps:
# Krok 1: Build Docker image (--no-cache wymusza pobranie najnowszej wersji vehicle-command)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--no-cache', '-f', 'Dockerfile.worker', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tesla-worker:latest', '.']

# Krok 2: Push image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tesla-worker:latest']

# UWAGA: krok deployu usunięty z cloudbuild. 'services replace' z YAML-em
# używającym tagu :latest NIE tworzy nowej rewizji (spec bez zmian) — serwis
# dalej serwował stary obraz. Deploy z przypiętym digestem wykonuje
# deploy_scout_worker.sh po zakończeniu builda.

timeout: '1200s'

# OPTYMALIZACJA KOSZTÓW (2025-12):
# - RAM: 2Gi -> 512Mi (faktyczne użycie ~80MB)
# - CPU: 2 -> 1 (faktyczne użycie <0.5)
# - Timeout: 600s -> 300s
# - Special Charging zintegrowane z midnight wake
